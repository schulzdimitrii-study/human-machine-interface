<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard App Inatel</title>
  <link rel="stylesheet" href="css/style.css?v=9">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/all.js';
    import { styles as typescaleStyles } from '@material/web/typography/md-typescale-styles.js';
    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>
  <script src="js/models.js"></script>
  <script src="js/components/headerComponent.js"></script>
  <script src="js/components/sidebarComponent.js"></script>
  <script src="js/components/bottomNavComponent.js"></script>
</head>

<body>
  <sidebar-component></sidebar-component>
  <header-component type="home"></header-component>

  <main>
    <div id="messages">
      <div id="user_name" class="font">Olá Raphael!</div>

      <div class="msg-box">
        <div class="icon"><span class="material-symbols-outlined icoP">notifications_active</span></div>
        <div class="msg font">Você possui um armário reservado com entrega para hoje...</div>
      </div>

      <div class="msg-box">
        <div class="icon"><span class="material-symbols-outlined icoP">mail</span></div>
        <div class="msg font">Você possui uma pendência no financeiro...</div>
      </div>
    </div>
    <class-component id="component"></class-component>
    <div class="carousel-container">
      <div class="carousel">
      </div>
      <button id="prevBtn">❮</button>
      <button id="nextBtn">❯</button>
    </div>
  </main>
  <script src="js/components/classComponent.js"></script>
  <script src="js/script.js?v=10"></script>
  <bottom-nav-component></bottom-nav-component>
</body>

</html>
