<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Inatel Vagas - Vagas de Estágio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Nunito+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css?v=2" />
    <link rel="stylesheet" href="../css/jobOpenings.css?v=2" />
    <script src="../js/jobOpenings.js?v=2"></script>
    <script src="../js/components/headerComponent.js?v=2"></script>
    <script src="../js/components/sidebarComponent.js?v=2"></script>
</head>

<body>
    <sidebar-component></sidebar-component>
    <div class="layout-wrapper">
        <header-component type="subpage" back-link="../index.html"></header-component>

        <main class="job-container">
            <h2 class="page-title">Vagas de Estágio</h2>
            <section class="search-section">
                <div class="search-bar-wrapper">
                    <div class="search-input-container">
                        <div class="search-icon-container">
                            <span class="material-symbols-outlined">search</span>
                        </div>
                        <input class="search-input" placeholder="Buscar por palavra-chave... (ex: Java, backend)"
                            type="text" />
                    </div>
                    <button class="search-button">
                        Buscar
                    </button>
                </div>
                <hr class="divider" />
            </section>

            <section id="job-listings-grid" class="job-grid">
            </section>

            <div class="load-more-container">
                <button class="load-more-button">
                    Carregar mais vagas
                </button>
            </div>
        </main>
</body>

</html>
